<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Komponentko Loading</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:black;
  overflow:hidden;
}

/* VIDEO LOADER ONLY */
#loader{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

#loader video{
  width:100%;
  height:100%;
  object-fit:cover;
}
</style>
</head>
<body>

<div id="loader">
  <video autoplay muted playsinline id="loadingVideo">
    <source src="grok-video-b2dd55aa-c6be-4877-b19d-f994200fcd00 (1).mp4" type="video/mp4">
  </video>
</div>

<script>
const video = document.getElementById('loadingVideo');

video.onended = function(){
  window.location.href = "domov.html";
};
</script>

</body>
</html>
